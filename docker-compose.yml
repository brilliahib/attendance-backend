version: '3.9'
name: attendance-backend

services:
  db:
    image: mysql:8.0
    container_name: attendance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: attendance_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --max_allowed_packet=128M

volumes:
  mysql_data:
